components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Course:
      type: object
      required: [id, title, slug, thumbnail, instructor, category, duration, enrolledCount, isFeatured]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        thumbnail:
          type: string
        instructor:
          $ref: "#/components/schemas/Instructor"
        category:
          type: string
        price:
          type: ["number", "null"]
        duration:
          type: string
        enrolledCount:
          type: integer
        isFeatured:
          type: boolean
        tag:
          type: ["string", "null"]

    CourseInput:
      type: object
      required: [title, category]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: number
        thumbnail:
          type: string

    CourseDetail:
      type: object
      required: [id, title, slug, thumbnail, instructor, category, duration, enrolledCount, isFeatured, modules]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        thumbnail:
          type: string
        instructor:
          $ref: "#/components/schemas/Instructor"
        category:
          type: string
        price:
          type: ["number", "null"]
        duration:
          type: string
        enrolledCount:
          type: integer
        isFeatured:
          type: boolean
        tag:
          type: ["string", "null"]
        modules:
          type: array
          items:
            $ref: "#/components/schemas/Module"

    Module:
      type: object
      required: [id, courseId, title, weekNumber, duration, lessonCount, completedCount]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        weekNumber:
          type: integer
        duration:
          type: string
        lessonCount:
          type: integer
        completedCount:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/Lesson"

    Lesson:
      type: object
      required: [id, moduleId, title, duration, orderIndex, isCompleted]
      properties:
        id:
          type: integer
        moduleId:
          type: integer
        title:
          type: string
        duration:
          type: string
        orderIndex:
          type: integer
        isCompleted:
          type: boolean
        videoUrl:
          type: ["string", "null"]

    LessonCompletion:
      type: object
      required: [lessonId, isCompleted]
      properties:
        lessonId:
          type: integer
        isCompleted:
          type: boolean

    Enrollment:
      type: object
      required: [id, courseId, course, progress, lastLessonTitle, enrolledAt]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        course:
          $ref: "#/components/schemas/Course"
        progress:
          type: number
        lastLessonTitle:
          type: ["string", "null"]
        enrolledAt:
          type: string

    BootcampInput:
      type: object
      required: [title, startDate, endDate, type]
      properties:
        title:
          type: string
        description:
          type: string
        thumbnail:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        type:
          type: string
          enum: [bootcamp, event]
        status:
          type: string
          enum: [upcoming, open, closed]

    Bootcamp:
      type: object
      required: [id, title, thumbnail, startDate, endDate, type, status]
      properties:
        id:
          type: integer
        title:
          type: string
        thumbnail:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string
        type:
          type: string
          enum: [bootcamp, event]
        status:
          type: string
          enum: [upcoming, open, closed]

    Post:
      type: object
      required: [id, title, content, author, category, status, createdAt, commentCount]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        author:
          $ref: "#/components/schemas/User"
        category:
          type: string
        status:
          type: string
          enum: [open, investigating, acknowledged, resolved]
        createdAt:
          type: string
        commentCount:
          type: integer
        platform:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    PostStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, investigating, acknowledged, resolved]

    PostInput:
      type: object
      required: [title, content, category]
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string

