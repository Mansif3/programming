openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Course Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: settings
    description: Site settings operations
  - name: health
    description: Health operations
  - name: courses
    description: Course operations
  - name: modules
    description: Module operations
  - name: lessons
    description: Lesson operations
  - name: enrollments
    description: Enrollment operations
  - name: bootcamps
    description: Bootcamp and event operations
  - name: helpdesk
    description: Help desk operations
  - name: announcements
    description: Announcement operations
  - name: users
    description: User operations
  - name: stats
    description: Stats and analytics

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /settings:
    get:
      operationId: getSiteSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsResponse"
    patch:
      operationId: updateSiteSettings
      tags: [settings]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsInput"
      responses:
        "200":
          description: Updated site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}:
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"

  /courses/{id}/modules:
    get:
      operationId: getCourseModules
      tags: [modules]
      summary: Get modules for a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a lesson by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /lessons/{id}/complete:
    post:
      operationId: completeLesson
      tags: [lessons]
      summary: Mark a lesson as complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completion status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonCompletion"

  /enrollments:
    get:
      operationId: listEnrollments
      tags: [enrollments]
      summary: List enrolled courses for current user
      responses:
        "200":
          description: List of enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enrollment"

  /enrollments/{courseId}:
    get:
      operationId: getEnrollment
      tags: [enrollments]
      summary: Get enrollment details for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enrollment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"

  /bootcamps:
    get:
      operationId: listBootcamps
      tags: [bootcamps]
      summary: List bootcamps and events
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [bootcamp, event]
      responses:
        "200":
          description: List of bootcamps/events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bootcamp"
    post:
      operationId: createBootcamp
      tags: [bootcamps]
      summary: Create a bootcamp or event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootcampInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bootcamp"

  /bootcamps/{id}:
    get:
      operationId: getBootcamp
      tags: [bootcamps]
      summary: Get bootcamp details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bootcamp details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bootcamp"
    delete:
      operationId: deleteBootcamp
      tags: [bootcamps]
      summary: Delete a bootcamp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /helpdesk/posts:
    get:
      operationId: listPosts
      tags: [helpdesk]
      summary: List help desk posts
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, mine, admin]
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      operationId: createPost
      tags: [helpdesk]
      summary: Create a help desk post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /helpdesk/posts/{id}:
    delete:
      operationId: deletePost
      tags: [helpdesk]
      summary: Delete a helpdesk post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    patch:
      operationId: updatePostStatus
      tags: [helpdesk]
      summary: Update post status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostStatusUpdate"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    get:
      operationId: getPost
      tags: [helpdesk]
      summary: Get a post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /helpdesk/posts/{id}/comments:
    get:
      operationId: listComments
      tags: [helpdesk]
      summary: List comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

    post:
      operationId: createComment
      tags: [helpdesk]
      summary: Add a comment to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /my/batches:
    get:
      operationId: getMyBatches
      tags: [student]
      summary: Get current student's enrolled batches
      responses:
        "200":
          description: Enrolled batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MyBatch"

  /my/batches/{id}/classes:
    get:
      operationId: getMyBatchClasses
      tags: [student]
      summary: Get published classes for an enrolled batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchClass"
        "403":
          description: Not enrolled

  /my/batches/{id}/helpdesk:
    get:
      operationId: getBatchHelpdesk
      tags: [student]
      summary: Get help desk posts for an enrolled batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchPost"
        "403":
          description: Not enrolled
    post:
      operationId: createBatchHelpdeskPost
      tags: [student]
      summary: Create a help desk post in an enrolled batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchPostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPost"

  /my/batches/{id}/helpdesk/{postId}/comments:
    get:
      operationId: getBatchPostComments
      tags: [student]
      summary: Get comments for a batch help desk post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchComment"
    post:
      operationId: createBatchPostComment
      tags: [student]
      summary: Add a comment to a batch help desk post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchComment"

  /my/batches/{id}/stats:
    get:
      operationId: getMyBatchStats
      tags: [student]
      summary: Get progress stats and weekly video duration for a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStats"

  /my/batches/{id}/announcements:
    get:
      operationId: getMyBatchAnnouncements
      tags: [student]
      summary: Get recent announcements for enrolled student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnouncementItem"

  /my/batches/{id}/classes/{classId}/watch:
    post:
      operationId: markBatchClassWatched
      tags: [student]
      summary: Mark a batch class as watched
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchInput"
      responses:
        "200":
          description: Watch recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/batches:
    get:
      operationId: listBatches
      tags: [admin]
      summary: List all batches
      responses:
        "200":
          description: Batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Batch"
    post:
      operationId: createBatch
      tags: [admin]
      summary: Create a new batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchInput"
      responses:
        "201":
          description: Created batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"

  /admin/batches/{id}:
    get:
      operationId: getBatch
      tags: [admin]
      summary: Get batch with classes and students
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetail"
        "404":
          description: Not found
    patch:
      operationId: updateBatch
      tags: [admin]
      summary: Update a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchInput"
      responses:
        "200":
          description: Updated batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
    delete:
      operationId: deleteBatch
      tags: [admin]
      summary: Delete a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/batches/{id}/classes:
    post:
      operationId: createBatchClass
      tags: [admin]
      summary: Add a class to a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchClassInput"
      responses:
        "201":
          description: Created class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchClass"

  /admin/batches/{id}/classes/{classId}:
    patch:
      operationId: updateBatchClass
      tags: [admin]
      summary: Update a batch class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchClassInput"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchClass"
    delete:
      operationId: deleteBatchClass
      tags: [admin]
      summary: Delete a batch class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/problem-bundles:
    get:
      operationId: listProblemBundles
      tags: [admin]
      summary: List all problem bundles
      responses:
        "200":
          description: List of problem bundles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProblemBundle"
    post:
      operationId: createProblemBundle
      tags: [admin]
      summary: Create a problem bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProblemBundleCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemBundle"

  /admin/problem-bundles/{id}:
    patch:
      operationId: updateProblemBundle
      tags: [admin]
      summary: Update a problem bundle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProblemBundleCreate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemBundle"
    delete:
      operationId: deleteProblemBundle
      tags: [admin]
      summary: Delete a problem bundle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/problem-bundles/{id}/problems:
    get:
      operationId: listBundleProblems
      tags: [admin]
      summary: List problems in a bundle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Problems in bundle
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BundleProblemItem"
    post:
      operationId: addBundleProblem
      tags: [admin]
      summary: Add a problem to a bundle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBundleProblemInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                type: object

  /admin/problem-bundles/{id}/problems/{problemId}:
    delete:
      operationId: removeBundleProblem
      tags: [admin]
      summary: Remove a problem from a bundle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: problemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /admin/batches/{id}/problem-bundles:
    get:
      operationId: listBatchProblemBundles
      tags: [admin]
      summary: List problem bundle assignments for a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchProblemBundleAssignment"
    post:
      operationId: assignBatchProblemBundle
      tags: [admin]
      summary: Assign a problem bundle to a batch with time window
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignBatchProblemBundleInput"
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchProblemBundleAssignment"

  /admin/batches/{id}/problem-bundles/{assignmentId}:
    patch:
      operationId: updateBatchProblemBundle
      tags: [admin]
      summary: Update a batch problem bundle time window
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBatchProblemBundleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchProblemBundleAssignment"
    delete:
      operationId: removeBatchProblemBundle
      tags: [admin]
      summary: Remove a problem bundle from a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /my/batches/{id}/problems:
    get:
      operationId: listBatchProblems
      tags: [batches]
